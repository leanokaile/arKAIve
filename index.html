<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arKAIve</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');

body{
margin:0;
font-family:Inter, sans-serif;
background: radial-gradient(circle at top, #f7f1e6, #ece3d3);
color:#2b2b2b;
overflow-x:hidden;
}

/* HEADER */
header{
text-align:center;
padding:60px 20px 30px;
}
h1{
font-family:'Playfair Display', serif;
font-size:48px;
letter-spacing:3px;
margin:0;
}

/* PAGES */
.page{
display:none;
max-width:1000px;
margin:auto;
padding:20px;
}
.page.active{
display:block;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

.card{
background:white;
padding:40px;
border-radius:16px;
text-align:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}
.card:hover{transform:translateY(-6px);}

.subcard{
background:white;
padding:18px;
margin:10px 0;
border-left:4px solid #c2a97a;
cursor:pointer;
}

/* WRITING */
.writing{
background:white;
padding:20px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
}

/* EXHIBIT VIEW */
#exhibit{
background:white;
padding:40px;
border-radius:16px;
line-height:1.7;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* ART */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.art-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
}
#lightbox img{
max-width:90%;
max-height:80%;
}

/* BUTTON */
button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#2b2b2b;
color:white;
border-radius:999px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>arKAIve</h1>
<p><i>A Digital Museum of Memory, Art & Writing</i></p>
</header>

<!-- HOME -->
<div id="home" class="page active">
<div class="grid">
<div class="card" onclick="showPage('literary')">Literary</div>
<div class="card" onclick="showPage('art')">Art</div>
<div class="card" onclick="showPage('about')">About</div>
</div>
</div>

<!-- LITERARY -->
<div id="literary" class="page">
<h2>Literary Wing</h2>

<div class="subcard" onclick="showPage('essays')">Essays</div>
<div class="subcard" onclick="showPage('poems')">Poems</div>

<button onclick="showPage('home')">Return</button>
</div>

<!-- ESSAYS -->
<div id="essays" class="page">
<h2>Essays</h2>

<div class="writing" onclick="openExhibit('A Legacy Unatoned','Paste your essay here...')">
A Legacy Unatoned
</div>

<div class="writing" onclick="openExhibit('SO BE IT.','Paste your essay here...')">
SO BE IT.
</div>

<button onclick="showPage('literary')">Back</button>
</div>

<!-- POEMS -->
<div id="poems" class="page">
<h2>Poetry</h2>

<div class="writing" onclick="openExhibit('Crimson','Paste poem here...')">
Crimson
</div>

<button onclick="showPage('literary')">Back</button>
</div>

<!-- EXHIBIT -->
<div id="exhibitPage" class="page">
<div id="exhibit">
<h2 id="exhibitTitle"></h2>
<p id="exhibitContent"></p>
<button onclick="goBack()">Return to Wing</button>
</div>
</div>

<!-- ART -->
<div id="art" class="page">
<h2>Art Wing</h2>

<div class="gallery">
<img src="https://imgur.com/TmM5TBm.jpg" onclick="openLightbox(this.src)">
<img src="https://imgur.com/YwjZsJD.jpg" onclick="openLightbox(this.src)">
<img src="https://imgur.com/KJaFSzI.jpg" onclick="openLightbox(this.src)">
</div>

<button onclick="showPage('home')">Return</button>
</div>

<!-- ABOUT -->
<div id="about" class="page">
<h2>About the Artist</h2>

<p>Email: <a href="mailto:leanokaile@email.com">leanokaile@email.com</a></p>
<p>Instagram: <a href="https://www.instagram.com/s.mooorez_" target="_blank">@s.mooorez_</a></p>

<h3>Commission Form</h3>
<iframe src="https://docs.google.com/forms/d/e/YOUR-FORM-ID/viewform?embedded=true" width="100%" height="500"></iframe>

<button onclick="showPage('home')">Return</button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightbox-img">
</div>

<script>
let historyStack = [];

function showPage(id){
historyStack.push(id);
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function goBack(){
historyStack.pop();
let prev = historyStack.pop();
showPage(prev || 'home');
}

function openExhibit(title, content){
document.getElementById('exhibitTitle').innerText = title;
document.getElementById('exhibitContent').innerText = content;
showPage('exhibitPage');
}

function openLightbox(src){
document.getElementById('lightbox').style.display='flex';
document.getElementById('lightbox-img').src = src;
}
</script>

</body>
</html>
